<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetTyper - Google Sheets Typing Game</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --correct: #4ade80;
            --incorrect: #f87171;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 2rem;
            letter-spacing: -0.025em;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 0.5rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        #text-display {
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            text-align: left;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 0.5rem;
            min-height: 100px;
            user-select: none;
        }

        #text-input {
            width: 100%;
            background: transparent;
            border: 2px solid var(--text-muted);
            border-radius: 0.5rem;
            padding: 1rem;
            color: var(--text-main);
            font-size: 1.2rem;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        #text-input:focus {
            border-color: var(--accent-color);
        }

        .char-correct { color: var(--correct); }
        .char-incorrect { color: var(--incorrect); background-color: rgba(248, 113, 113, 0.2); }
        .char-current { border-bottom: 2px solid var(--accent-color); }

        .controls {
            margin-top: 2rem;
        }

        button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .setup-hint {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>SheetTyper</h1>
    
    <div class="stats-bar">
        <div class="stat-item">
            <span id="timer" class="stat-value">0</span>
            <span class="stat-label">Seconds</span>
        </div>
        <div class="stat-item">
            <span id="wpm" class="stat-value">0</span>
            <span class="stat-label">WPM</span>
        </div>
        <div class="stat-item">
            <span id="accuracy" class="stat-value">100%</span>
            <span class="stat-label">Accuracy</span>
        </div>
    </div>

    <div id="text-display">Loading phrases from Google Sheets...</div>
    
    <textarea id="text-input" placeholder="Start typing here..." spellcheck="false" autofocus></textarea>

    <div class="controls">
        <button id="reset-btn">Restart Game</button>
    </div>

    <p class="setup-hint">
        Note: Ensure your Google Sheet is "Published to Web" as CSV.
    </p>
</div>

<script>
    /**
     * CONFIGURATION
     * Replace the URL below with your Google Sheet 'Published to Web' CSV link.
     */
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRs5BOOOMH-KGjk1fwF7OBeQr6_qlNS-O7o615kM1CELNHT0qojKWs6IZUzuL43Fj50bjCevbyCFV8i/pub?gid=0&single=true&output=csv';

    const textDisplay = document.getElementById('text-display');
    const textInput = document.getElementById('text-input');
    const timerElement = document.getElementById('timer');
    const wpmElement = document.getElementById('wpm');
    const accuracyElement = document.getElementById('accuracy');
    const resetBtn = document.getElementById('reset-btn');

    let phrases = [];
    let currentPhrase = "";
    let timerInterval = null;
    let startTime = null;
    let isGameRunning = false;
    let totalErrors = 0;

    // Initialize: Fetch data
    async function init() {
        if (CSV_URL === 'YOUR_PUBLISHED_CSV_URL_HERE') {
            textDisplay.innerHTML = "<span style='color: #f87171;'>Error: Please update the script with your Google Sheet CSV URL.</span>";
            return;
        }

        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            // Parse CSV (splits by lines, removes quotes if present)
            phrases = data.split(/\r?\n/).map(p => p.replace(/^"|"$/g, '').trim()).filter(p => p.length > 0);
            
            if (phrases.length === 0) throw new Error("Empty list");
            startNewRound();
        } catch (error) {
            console.error(error);
            textDisplay.innerText = "Failed to load words. Check your URL and CORS settings.";
        }
    }

    function startNewRound() {
        stopTimer();
        isGameRunning = false;
        totalErrors = 0;
        textInput.value = "";
        textInput.disabled = false;
        wpmElement.innerText = "0";
        accuracyElement.innerText = "100%";
        timerElement.innerText = "0";

        currentPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        
        // Wrap characters in spans for coloring
        textDisplay.innerHTML = "";
        currentPhrase.split('').forEach((char, index) => {
            const span = document.createElement('span');
            span.innerText = char;
            if (index === 0) span.classList.add('char-current');
            textDisplay.appendChild(span);
        });
        
        textInput.focus();
    }

    textInput.addEventListener('input', () => {
        const charSpans = textDisplay.querySelectorAll('span');
        const inputValue = textInput.value.split('');

        // Start timer on first keystroke
        if (!isGameRunning && textInput.value.length > 0) {
            startTimer();
            isGameRunning = true;
        }

        let mistakes = 0;
        charSpans.forEach((span, index) => {
            const char = inputValue[index];
            span.classList.remove('char-current');

            if (char == null) {
                span.classList.remove('char-correct', 'char-incorrect');
                if (index === inputValue.length) span.classList.add('char-current');
            } else if (char === span.innerText) {
                span.classList.add('char-correct');
                span.classList.remove('char-incorrect');
            } else {
                span.classList.add('char-incorrect');
                span.classList.remove('char-correct');
                mistakes++;
            }
        });

        // Update Stats
        updateStats(inputValue.length, mistakes);

        // Check if finished
        if (inputValue.length >= currentPhrase.length && mistakes === 0) {
            finishGame();
        }
    });

    function startTimer() {
        startTime = new Date();
        timerInterval = setInterval(() => {
            timerElement.innerText = Math.floor((new Date() - startTime) / 1000);
            const currentWPM = calculateWPM();
            wpmElement.innerText = currentWPM > 0 ? currentWPM : 0;
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
    }

    function calculateWPM() {
        const timeElapsedMinutes = (new Date() - startTime) / 60000;
        if (timeElapsedMinutes <= 0) return 0;
        // Standard WPM: (Chars / 5) / Time
        return Math.round((textInput.value.length / 5) / timeElapsedMinutes);
    }

    function updateStats(length, currentMistakes) {
        if (length > 0) {
            const accuracy = Math.round(((length - currentMistakes) / length) * 100);
            accuracyElement.innerText = accuracy + "%";
        }
    }

    function finishGame() {
        stopTimer();
        textInput.disabled = true;
        const finalWPM = calculateWPM();
        wpmElement.innerText = finalWPM;
        alert(`Finished! WPM: ${finalWPM}`);
    }

    resetBtn.addEventListener('click', startNewRound);

    // Run
    init();
</script>

</body>
</html>
