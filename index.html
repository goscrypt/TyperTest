<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetTyper - Dynamic Tabs</title>
    <style>
        /* (Using the same CSS from the previous version) */
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --muted: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .game-container { background: var(--card); padding: 2rem; border-radius: 1rem; width: 90%; max-width: 700px; text-align: center; }
        select { background: #0f172a; color: white; padding: 10px; border-radius: 5px; border: 1px solid var(--muted); width: 100%; margin-bottom: 20px; cursor: pointer; }
        #text-display { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; font-size: 1.3rem; margin-bottom: 20px; text-align: left; min-height: 80px; }
        textarea { width: 100%; height: 100px; background: transparent; color: white; border: 2px solid var(--muted); border-radius: 10px; padding: 15px; font-size: 1.1rem; outline: none; }
        .char-correct { color: #4ade80; }
        .char-incorrect { color: #f87171; text-decoration: underline; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>SheetTyper Dynamic</h1>
    
    <label style="font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 5px;">SELECT CATEGORY</label>
    <select id="sheet-selector">
        <option>Loading categories...</option>
    </select>

    <div id="text-display">Select a tab above to load words.</div>
    <textarea id="text-input" placeholder="Type here..." disabled></textarea>
    
    <div style="margin-top: 20px;">
        <button id="reset-btn" style="background: var(--accent); border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;">New Quote</button>
    </div>
</div>

<script>
    // 1. REPLACE THIS ID WITH YOUR SPREADSHEET ID
    const SPREADSHEET_ID = 'YOUR_LONG_ID_HERE'; 

    const selector = document.getElementById('sheet-selector');
    const display = document.getElementById('text-display');
    const input = document.getElementById('text-input');
    const resetBtn = document.getElementById('reset-btn');

    let allPhrases = [];

    // 2. Fetch all sheet (tab) names from the Spreadsheet metadata
    async function loadSheetNames() {
        // This endpoint returns a JSON-like structure of the spreadsheet's sheets
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;
        
        try {
            const response = await fetch(url);
            const text = await response.text();
            // Google wraps the response in a function call, we need to strip it
            const json = JSON.parse(text.substring(47, text.length - 2));
            
            selector.innerHTML = '<option value="">-- Choose a Category --</option>';
            
            // Note: This specific visualization API method is tricky for sheet names. 
            // Most reliable way: Manual list OR using a specific "Apps Script" proxy.
            // PRO-TIP: Since Visualization API varies, we'll use the CSV Export strategy 
            // for the actual phrases once a name is picked.
            
            // For now, let's assume you have tabs named "Easy", "Medium", "Hard"
            // If you want it TRULY automatic without an API Key, you'll need a tiny Apps Script.
            
            // Alternative: Add your Tab Names here manually, and the code below 
            // will handle the automatic CSV fetching for whatever tab you pick.
            const tabs = ["General", "Code", "Literature", "Movies"]; 
            tabs.forEach(tab => {
                const opt = document.createElement('option');
                opt.value = tab;
                opt.innerText = tab;
                selector.appendChild(opt);
            });

        } catch (e) {
            display.innerText = "Error connecting to Google Sheets.";
        }
    }

    // 3. Fetch CSV for the specific selected tab
    selector.addEventListener('change', async (e) => {
        const sheetName = e.target.value;
        if (!sheetName) return;

        display.innerText = "Loading data...";
    const SPREADSHEET_ID = '1bBtu--rg2hxOVic7v-T6nln9Fb1GN8K8ZSs6b_1nNKE';

// Inside your event listener:
const csvUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
        
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            allPhrases = data.split(/\r?\n/).map(p => p.replace(/^"|"$/g, '')).filter(p => p.length > 2);
            startRound();
        } catch (err) {
            display.innerText = "Error: Make sure the sheet is 'Published to Web'.";
        }
    });

    function startRound() {
        if (allPhrases.length === 0) return;
        const phrase = allPhrases[Math.floor(Math.random() * allPhrases.length)];
        
        display.innerHTML = '';
        phrase.split('').forEach(char => {
            const span = document.createElement('span');
            span.innerText = char;
            display.appendChild(span);
        });
        
        input.value = "";
        input.disabled = false;
        input.focus();
    }

    input.addEventListener('input', () => {
        const spans = display.querySelectorAll('span');
        const chars = input.value.split('');
        
        spans.forEach((span, i) => {
            if (chars[i] == null) span.className = '';
            else if (chars[i] === span.innerText) span.className = 'char-correct';
            else span.className = 'char-incorrect';
        });

        if (input.value === display.innerText) {
            input.disabled = true;
            setTimeout(() => alert("Completed!"), 100);
        }
    });

    resetBtn.onclick = startRound;
    loadSheetNames();
</script>

</body>
</html>
